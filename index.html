<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MOMOS Recipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{--bk:#111;--wh:#fff;--off:#F7F6F3;--off2:#EFECEA;--st:#88847F;--stl:#C5C1BB;--stx:#E6E3DC;--ln:rgba(0,0,0,.09);--lnm:rgba(0,0,0,.16);--bl:#0B76BE;--bld:#075F99;--blbg:rgba(11,118,190,.08);--rd:#C8392B;--gn:#2E7D52;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Noto Serif KR',serif;background:var(--wh);color:var(--bk);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;}
input,textarea,select{font-family:'Noto Serif KR',serif;-webkit-appearance:none;border-radius:0;}
/* LOGIN */
#LS{position:fixed;inset:0;z-index:9999;background:var(--wh);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity .4s;}
#LS.out{opacity:0;pointer-events:none;}
.ls-top{width:100%;background:var(--bl);display:flex;align-items:center;justify-content:center;padding:28px 20px 24px;position:absolute;top:0;left:0;}
#ll-logo{width:clamp(120px,32vw,180px);}
.ls-body{display:flex;flex-direction:column;align-items:center;margin-top:120px;}
.ll-sub{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--stl);margin-bottom:40px;text-align:center;}
.lf{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;}
.lf input{background:var(--off);border:1px solid var(--stx);color:var(--bk);font-family:'Space Mono',monospace;font-size:14px;letter-spacing:3px;padding:15px 16px;outline:none;width:100%;transition:border-color .2s;}
.lf input:focus{border-color:var(--bl);}
.lf input::placeholder{color:var(--stl);}
.lf-btn{background:var(--bl);border:none;color:var(--wh);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;padding:16px;width:100%;}
.lf-btn:active{background:var(--bld);}
.lerr{font-family:'Space Mono',monospace;font-size:10px;color:var(--rd);text-align:center;height:16px;letter-spacing:1px;}
/* NOTICE */
.ntc{background:var(--bl);color:var(--wh);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-align:center;padding:9px 40px;position:relative;}
.ntcx{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.55);font-size:14px;padding:4px;}
/* HEADER */
header{border-bottom:1px solid var(--lnm);background:var(--wh);position:sticky;top:0;z-index:100;}
.hdr{display:flex;align-items:center;padding:0 16px;height:60px;gap:10px;}
@media(min-width:768px){.hdr{padding:0 48px;height:76px;}}
#hdr-logo{height:30px;width:auto;flex-shrink:0;}
@media(min-width:768px){#hdr-logo{height:40px;}}
.hsr{display:flex;align-items:center;gap:9px;border:1px solid var(--stx);padding:9px 13px;flex:1;max-width:260px;margin-left:auto;transition:border-color .2s;}
.hsr:focus-within{border-color:var(--bl);}
.hsr svg{color:var(--stl);flex-shrink:0;}
.hsr input{border:none;background:transparent;font-size:13px;color:var(--bk);width:100%;outline:none;min-width:0;}
.hsr input::placeholder{color:var(--stl);}
@media(max-width:480px){.hsr{display:none;}}
.hdr-acts{display:flex;align-items:center;gap:6px;margin-left:10px;flex-shrink:0;}
.hbtn{background:none;border:1px solid var(--stx);color:var(--st);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:7px 10px;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.hbtn:hover{border-color:var(--bl);color:var(--bl);}
.hbtn.pri{background:var(--bl);border-color:var(--bl);color:var(--wh);}
.hbtn.pri:hover{background:var(--bld);}
.hbtn-lbl{display:none;}
@media(min-width:540px){.hbtn-lbl{display:inline;}}
/* MOBILE SEARCH */
.ms{display:none;padding:10px 16px;border-bottom:1px solid var(--ln);background:var(--off);}
.msi{display:flex;align-items:center;gap:9px;border:1px solid var(--stx);background:var(--wh);padding:10px 13px;}
.msi:focus-within{border-color:var(--bl);}
.msi input{border:none;background:transparent;font-size:14px;color:var(--bk);width:100%;outline:none;}
.msi input::placeholder{color:var(--stl);}
@media(max-width:480px){.ms{display:block;}}
/* CAT TABS */
.ctabs{display:flex;border-bottom:1px solid var(--ln);overflow-x:auto;background:var(--wh);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.ctabs::-webkit-scrollbar{display:none;}
.ctab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--st);background:none;border:none;padding:13px 16px;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;flex-shrink:0;}
.ctab.on{color:var(--bl);border-bottom-color:var(--bl);}
.ctab-add{padding:10px 16px;background:none;border:none;color:var(--stl);font-size:18px;display:flex;align-items:center;transition:color .15s;flex-shrink:0;margin-left:auto;}
.ctab-add:hover{color:var(--bl);}
/* BODY */
.ab{display:flex;}
.sb{display:none;}
@media(min-width:900px){.sb{display:block;width:186px;flex-shrink:0;border-right:1px solid var(--ln);padding:28px 0;position:sticky;top:77px;height:calc(100vh - 77px);overflow-y:auto;}.sb::-webkit-scrollbar{width:3px;}.sb::-webkit-scrollbar-thumb{background:var(--stx);}}
.slbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--stl);padding:0 20px;margin-bottom:6px;display:block;}
.sbn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 20px;background:none;border:none;border-left:2px solid transparent;font-size:13px;color:var(--bk);text-align:left;transition:all .13s;}
.sbn:hover{background:var(--off);color:var(--bl);}
.sbn.on{color:var(--bl);background:var(--blbg);border-left-color:var(--bl);font-weight:600;}
.scnt{font-family:'Space Mono',monospace;font-size:9px;color:var(--stl);}
.sbn.on .scnt{color:var(--bl);opacity:.6;}
/* MAIN */
.main{flex:1;padding:20px 16px 60px;min-width:0;}
@media(min-width:768px){.main{padding:32px 40px 60px;}}
.mhd{margin-bottom:20px;}
.mt{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;letter-spacing:1px;color:var(--bk);margin-bottom:3px;}
@media(min-width:768px){.mt{font-size:24px;}}
.mm{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--st);text-transform:uppercase;}
.mm b{color:var(--bl);font-weight:400;}
/* GRID */
.rg{display:grid;grid-template-columns:1fr;border-top:1px solid var(--lnm);border-left:1px solid var(--lnm);}
@media(min-width:420px){.rg{grid-template-columns:repeat(2,1fr);}}
@media(min-width:700px){.rg{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.rg{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}}
.rc{border-right:1px solid var(--lnm);border-bottom:1px solid var(--lnm);background:var(--wh);cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;transition:background .13s;display:flex;flex-direction:column;}
.rc:active{background:var(--off);}
@media(min-width:768px){.rc:hover{background:var(--off);}.rc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:var(--bl);transform:scaleX(0);transform-origin:left;transition:transform .22s ease;}.rc:hover::after{transform:scaleX(1);}}
.rc-ph{width:100%;aspect-ratio:4/3;background:var(--off2);overflow:hidden;position:relative;flex-shrink:0;}
.rc-ph img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.rc:hover .rc-ph img{transform:scale(1.04);}
.rc-ph-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--stl);}
.rc-ph-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .18s;cursor:pointer;border:none;}
.rc-ph-btn span{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--wh);background:var(--bl);padding:5px 10px;}
.rc:hover .rc-ph-btn{opacity:1;}
.rc-ph-input{display:none;}
.rc-info{padding:14px 14px 13px;flex:1;display:flex;flex-direction:column;}
.rc-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;}
.rc-cat{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--stl);}
.rc-fav{background:none;border:none;font-size:18px;color:var(--stl);padding:4px;line-height:1;min-width:32px;text-align:center;}
.rc-fav.on{color:#E8A020;}
.rc-name{font-size:15px;font-weight:500;color:var(--bk);line-height:1.3;margin-bottom:8px;}
@media(min-width:768px){.rc-name{font-size:16px;}}
.rc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto;}
.rt{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--st);background:var(--off2);padding:2px 5px;}
.rt.b{color:var(--bl);background:var(--blbg);}
.rt.g{color:var(--gn);background:rgba(46,125,82,.08);}
.empty-s{grid-column:1/-1;text-align:center;padding:60px 20px;}
.ei{font-size:28px;opacity:.2;margin-bottom:10px;}
.et{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--st);}
/* PANEL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
.ov.open{display:block;}
.panel{position:fixed;z-index:201;background:var(--wh);overflow-y:auto;-webkit-overflow-scrolling:touch;bottom:0;left:0;right:0;max-height:94dvh;border-radius:14px 14px 0 0;animation:su .28s ease-out;}
@media(min-width:768px){.panel{top:0;bottom:0;right:0;left:auto;width:min(700px,90vw);max-height:none;border-radius:0;border-left:1px solid var(--lnm);animation:pi .25s ease-out;}}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:var(--stx);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pi{from{transform:translateX(100%)}to{transform:translateX(0)}}
.dh{display:flex;justify-content:center;padding:10px;}
.dhb{width:36px;height:4px;background:var(--stx);border-radius:2px;}
@media(min-width:768px){.dh{display:none;}}
.phd{background:var(--bk);padding:18px 22px 16px;position:sticky;top:0;z-index:5;}
@media(min-width:768px){.phd{padding:24px 32px 20px;}}
.phd-r{float:right;display:flex;align-items:center;gap:6px;}
.pa-btn{background:none;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:5px 10px;transition:all .15s;}
.pa-btn:hover{border-color:rgba(255,255,255,.5);color:var(--wh);}
.pa-btn.del:hover{border-color:#ff6b6b;color:#ff6b6b;}
.pcl{background:none;border:none;color:rgba(255,255,255,.3);font-size:17px;font-family:'Space Mono',monospace;padding:4px;}
.pcl:hover{color:var(--bl);}
.pcat-sel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--bl);background:none;border:none;border-bottom:1px solid rgba(11,118,190,.35);outline:none;padding:2px 18px 2px 0;margin-bottom:7px;margin-top:4px;cursor:pointer;-webkit-appearance:auto;appearance:auto;}
.pnm-in{background:none;border:none;border-bottom:1px solid rgba(255,255,255,.15);color:var(--wh);font-size:20px;font-weight:600;outline:none;width:100%;padding:2px 0;transition:border-color .2s;}
.pnm-in:focus{border-bottom-color:var(--bl);}
@media(min-width:768px){.pnm-in{font-size:24px;}}
.pbd{padding:18px 18px 40px;}
@media(min-width:768px){.pbd{padding:24px 32px 48px;}}
/* PANEL PHOTO */
.pp-wrap{margin-bottom:20px;position:relative;}
.pp-area{width:100%;aspect-ratio:16/6;background:var(--off2);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed var(--stx);overflow:hidden;transition:border-color .2s;}
.pp-area:hover{border-color:var(--bl);}
.pp-area img{width:100%;height:100%;object-fit:cover;}
.pp-empty{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--stl);pointer-events:none;}
.pp-empty span{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;}
.pp-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;color:var(--wh);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:5px 10px;cursor:pointer;opacity:0;transition:opacity .15s;}
.pp-wrap:hover .pp-del{opacity:1;}
.pp-in{display:none;}
/* CALC */
.calc{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--off);border:1px solid var(--stx);padding:13px 15px;margin-bottom:22px;}
.clbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--st);white-space:nowrap;}
.qw{display:flex;align-items:stretch;border:1px solid var(--stl);background:var(--wh);overflow:hidden;}
.qb{width:44px;height:46px;background:none;border:none;font-family:'Space Mono',monospace;font-size:20px;color:var(--st);transition:background .12s,color .12s;}
.qb:active,.qb:hover{background:var(--bl);color:var(--wh);}
.qi{width:64px;border:none;text-align:center;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--bk);outline:none;border-left:1px solid var(--stx);border-right:1px solid var(--stx);}
.cst{font-family:'Space Mono',monospace;font-size:10px;color:var(--bl);background:var(--blbg);padding:5px 11px;white-space:nowrap;}
.ctot{font-family:'Space Mono',monospace;font-size:10px;color:var(--gn);background:rgba(46,125,82,.08);padding:5px 11px;white-space:nowrap;display:none;}
.ctot.show{display:block;}
/* SECTION */
.sblk{margin-bottom:24px;}
.shd{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--st);padding-bottom:7px;border-bottom:1px solid var(--lnm);}
.sbdg{margin-left:auto;background:var(--bl);color:var(--wh);font-family:'Space Mono',monospace;font-size:8px;padding:2px 8px;}
/* TABLE */
.itbl{width:100%;border-collapse:collapse;font-size:12px;}
.itbl th{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--stl);text-align:left;padding:7px 6px;border-bottom:1px solid var(--ln);}
.itbl th:not(:first-child){text-align:right;}
.itbl td{padding:8px 6px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:middle;}
.itbl td:not(:first-child){text-align:right;font-family:'Space Mono',monospace;font-size:10px;}
.itbl tr:hover td{background:var(--off);}
.tot-row td{font-family:'Space Mono',monospace;font-weight:700;font-size:11px;border-top:1.5px solid var(--lnm)!important;border-bottom:none!important;padding-top:10px!important;background:transparent!important;}
.en{border:none;background:transparent;font-size:12px;color:var(--bk);width:100%;outline:none;padding:2px 3px;}
.en:focus{background:var(--off2);box-shadow:0 0 0 1.5px var(--bl);}
.enum{border:none;background:transparent;font-family:'Space Mono',monospace;font-size:10px;color:var(--bk);text-align:right;width:55px;outline:none;padding:2px 3px;}
.enum:focus{background:var(--off2);box-shadow:0 0 0 1.5px var(--bl);}
.cv{font-weight:700!important;color:var(--bl)!important;}
.cc{color:var(--gn)!important;font-size:9px!important;}
.rbc{display:flex;align-items:center;gap:4px;justify-content:flex-end;}
.rbar{width:28px;height:3px;background:var(--stx);border-radius:2px;overflow:hidden;}
.rfill{height:100%;background:var(--bl);}
.rnum{font-size:9px;color:var(--st);width:30px;text-align:right;}
.xbtn{background:none;border:none;color:var(--stl);font-size:12px;padding:3px;line-height:1;}
.xbtn:hover,.xbtn:active{color:var(--rd);}
.addr{display:flex;align-items:center;gap:6px;width:100%;padding:9px 6px;margin-top:5px;background:none;border:1px dashed var(--stx);font-size:12px;color:var(--st);}
.addr:hover,.addr:active{border-color:var(--bl);color:var(--bl);background:var(--blbg);}
/* PROCESS */
.procw{margin-top:20px;padding-top:20px;border-top:1px solid var(--ln);}
.ptit{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--st);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.svd{font-size:9px;color:var(--bl);opacity:0;transition:opacity .3s;}
.svd.show{opacity:1;}
.stlist{list-style:none;counter-reset:sc;}
.stli{counter-increment:sc;display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.stli::before{content:counter(sc,decimal-leading-zero);font-family:'Space Mono',monospace;font-size:10px;color:var(--bl);font-weight:700;flex-shrink:0;margin-top:9px;}
.sta{flex:1;border:1px solid var(--stx);background:var(--off);padding:9px 11px;font-size:13px;color:var(--bk);resize:none;outline:none;line-height:1.55;}
.sta:focus{border-color:var(--bl);}
.sdel{background:none;border:none;color:var(--stl);font-size:13px;padding:5px;flex-shrink:0;margin-top:7px;}
.sdel:hover,.sdel:active{color:var(--rd);}
.adds{display:flex;align-items:center;gap:6px;padding:9px 6px;margin-top:4px;background:none;border:1px dashed var(--stx);font-size:12px;color:var(--st);}
.adds:hover,.adds:active{border-color:var(--bl);color:var(--bl);background:var(--blbg);}
/* NOTES */
.notew{margin-top:18px;padding-top:18px;border-top:1px solid var(--ln);}
.noteta{width:100%;padding:11px 12px;border:1px solid var(--stx);background:var(--off);font-size:13px;color:var(--bk);min-height:76px;resize:vertical;outline:none;line-height:1.6;}
.noteta:focus{border-color:var(--bl);}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
.mov.open{display:flex;}
.modal{background:var(--wh);width:100%;max-width:420px;padding:26px;}
.modal-title{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;font-weight:700;margin-bottom:18px;}
.mfield{margin-bottom:12px;}
.mlbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--st);margin-bottom:5px;display:block;}
.min{width:100%;border:1px solid var(--stx);padding:11px 12px;font-size:14px;color:var(--bk);outline:none;background:var(--wh);}
.min:focus{border-color:var(--bl);}
.msel{width:100%;border:1px solid var(--stx);padding:11px 12px;font-size:14px;color:var(--bk);outline:none;background:var(--wh);cursor:pointer;}
.macts{display:flex;gap:8px;margin-top:18px;}
.mbtn{flex:1;padding:13px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;border:none;}
.mbtn.cancel{background:var(--off);color:var(--st);}
.mbtn.cancel:hover{background:var(--stx);}
.mbtn.ok{background:var(--bl);color:var(--wh);}
.mbtn.ok:hover{background:var(--bld);}
.mbtn.danger{background:var(--rd);color:var(--wh);}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bk);color:var(--wh);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;padding:12px 20px;z-index:900;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* PRINT */
@media print{#LS,header,.ntc,.ctabs,.ab,.ov,.panel,.toast,.mov{display:none!important;}#print-area{display:block!important;}}
#print-area{display:none;padding:20px;}
</style>
</head>
<body>

<div id="LS">
  <div class="ls-top">
    <img id="ll-logo" alt="MOMOS">
  </div>
  <div class="ls-body">
    <div class="ll-sub">Recipe &amp; Formula Manager</div>
    <div class="lf">
      <input id="lpw" type="password" placeholder="PASSWORD" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      <button class="lf-btn" onclick="login()">Enter</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="ntc" id="ntc">MOMOS BAKERY — 레시피 &amp; 배합 관리 &nbsp;·&nbsp; 직원 전용
    <button class="ntcx" onclick="this.parentElement.remove()">&#x2715;</button>
  </div>
  <header>
    <div class="hdr">

function buildNav(){

    `<button class="ctab-add" onclick="openModal('m-addcat')">+</button>`;
}
function setCat(c){S.cat=c;S.q='';['si1','si2'].forEach(i=>{const e=$(i);if(e)e.value='';});buildNav();renderGrid();}
function doSearch(q){S.q=q.trim();renderGrid();}

function renderGrid(){
  const list=Object.entries(S.recipes)
    .filter(([n,d])=>(S.cat==='전체'||d.category===S.cat)&&(!S.q||n.includes(S.q)))
    .sort((a,b)=>(S.favs[b[0]]?1:0)-(S.favs[a[0]]?1:0)||a[0].localeCompare(b[0],'ko'));
  $('mtit').textContent=S.cat==='전체'?'전체 레시피':S.cat;
  $('mmeta').innerHTML=`<b>${list.length}</b>개 · Momos Bakery`;
  if(!list.length){$('rg').innerHTML='<div class="empty-s"><div class="ei">🥐</div><p class="et">레시피가 없습니다</p></div>';return;}
  $('rg').innerHTML=list.map(([n,d])=>{
    const ph=S.photos[n];const fav=!!S.favs[n];
    const tot=(d.sections||[]).reduce((s,sec)=>s+(sec.ingredients||[]).length,0);
    const hasP=(S.procs[n]||[]).length>0;
    return `<div class="rc" onclick="openPanel('${ex(n)}')">
      <div class="rc-ph">
        ${ph?`<img src="${ph}" alt="${n}" loading="lazy">`:'<div class="rc-ph-empty">🥐</div>'}
        <button class="rc-ph-btn" onclick="event.stopPropagation();document.getElementById('cph_${sid(n)}').click()">${ph?'변경':'사진+'}</button>
        <input class="rc-ph-input" id="cph_${sid(n)}" type="file" accept="image/*" onchange="onPhoto('${ex(n)}',this)">
      </div>
      <div class="rc-info">
        <div class="rc-row"><span class="rc-cat">${d.category}</span>
          <button class="rc-fav${fav?' on':''}" onclick="event.stopPropagation();toggleFav('${ex(n)}')">${fav?'★':'☆'}</button>
        </div>
        <div class="rc-name">${n}</div>
        <div class="rc-tags">
          <span class="rt">${tot}가지</span>
          <span class="rt">${(d.sections||[]).length}파트</span>
          ${hasP?'<span class="rt b">공정✓</span>':''}
          ${fav?'<span class="rt g">즐겨찾기</span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openPanel(name){
  const d=S.recipes[name];if(!d)return;
  S.cur=name;
  const sel=$('pcat-sel');
  sel.innerHTML=S.cats.filter(c=>c!=='전체').map(c=>`<option value="${c}"${c===d.category?' selected':''}>${c}</option>`).join('');
  $('pnm-in').value=name;
  $('pbd').innerHTML=buildBody(name,d);
  $('ov').classList.add('open');
  $('panel').classList.add('open');
  $('panel').scrollTop=0;
  document.body.style.overflow='hidden';
  updateCalc(name);
}
function closePanel(){
  $('ov').classList.remove('open');
  $('panel').classList.remove('open');
  document.body.style.overflow='';
  S.cur=null;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

function buildBody(name,d){
  const id=sid(name),procs=S.procs[name]||[],notes=S.notes[name]||'',ph=S.photos[name];
  let h=`<div class="pp-wrap">
    <div class="pp-area" onclick="document.getElementById('pph_${id}').click()">
      ${ph?`<img src="${ph}" alt="${name}">`:`<div class="pp-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>사진 추가</span></div>`}
    </div>
    ${ph?`<button class="pp-del" onclick="delPhoto('${ex(name)}')">✕ 사진 삭제</button>`:''}
    <input class="pp-in" id="pph_${id}" type="file" accept="image/*" onchange="onPhoto('${ex(name)}',this)">
  </div>
  <div class="calc">
    <span class="clbl">수량</span>
    <div class="qw">
      <button class="qb" onclick="chQ('${ex(name)}',-1)">−</button>
      <input class="qi" id="qty_${id}" type="number" value="1" min="1" oninput="updateCalc('${ex(name)}')">
      <button class="qb" onclick="chQ('${ex(name)}',1)">＋</button>
    </div>
    <span class="cst" id="cs_${id}">1개 기준</span>
    <span class="ctot" id="ct_${id}"></span>
  </div>`;
  const adds=S.adds[name]||{},dels=S.dels[name]||{},edits=S.edits[name]||{};
  (d.sections||[]).forEach((sec,si)=>{
    const lbl=sec.section||(si===0?'반죽':`파트${si+1}`);
    const baseI=(sec.ingredients||[]).map((ing,ii)=>({ing,ii,isAdd:false})).filter(({ii})=>!dels[`${si}_${ii}`]);
    const addI=(adds[si]||[]).map((ing,ai)=>({ing,ai,isAdd:true}));
    const all=[...baseI,...addI];
    const maxR=all.reduce((m,x)=>Math.max(m,x.ing.ratio||0),0)||100;
    const rows=all.map(({ing,ii,isAdd,ai})=>{
      const ed=isAdd?{}:(edits[`${si}_${ii}`]||{});
      const cn=ed.name!==undefined?ed.name:ing.name;
      const cp=ed.per_one!==undefined?ed.per_one:ing.per_one;
      const cr=ed.ratio!==undefined?ed.ratio:ing.ratio;
      const rk=isAdd?`add_${si}_${ai}`:`${si}_${ii}`;
      const chFn=isAdd?`eAddIng('${ex(name)}',${si},${ai}`:`eIng('${ex(name)}',${si},${ii}`;
      const delFn=isAdd?`delAddIng('${ex(name)}',${si},${ai})`:`delBaseIng('${ex(name)}',${si},${ii})`;
      return `<tr><td><input class="en" value="${String(cn).replace(/"/g,'&quot;')}" onchange="${chFn},'name',this.value)"></td>
        <td><input class="enum" value="${cp}" type="number" step="0.001" min="0" onchange="${chFn},'per_one',parseFloat(this.value)||0)" oninput="updateCalc('${ex(name)}')"></td>
        <td class="cv" id="cv_${id}_${rk}">—</td><td class="cc" id="cc_${id}_${rk}">—</td>
        <td><div class="rbc"><div class="rbar"><div class="rfill" style="width:${Math.min(100,(cr/maxR)*100).toFixed(1)}%"></div></div><span class="rnum">${Number(cr).toFixed(1)}%</span></div></td>
        <td><button class="xbtn" onclick="${delFn}">✕</button></td></tr>`;
    }).join('');
    h+=`<div class="sblk"><div class="shd">${lbl}<span class="sbdg">기준 ${sec.base_count||1}개</span></div>
      <table class="itbl"><thead><tr><th>재료명</th><th>1개(g)</th><th>계산량</th><th>원가</th><th>비율</th><th></th></tr></thead>
      <tbody id="tb_${id}_${si}">${rows}</tbody>
      <tfoot><tr class="tot-row"><td>총중량</td><td id="t1_${id}_${si}">—</td><td id="tc_${id}_${si}">—</td><td id="tcc_${id}_${si}" style="color:var(--gn)">—</td><td></td><td></td></tr></tfoot>
      </table><button class="addr" onclick="addIng('${ex(name)}',${si})">＋ 재료 추가</button></div>`;
  });
  h+=`<div class="procw"><div class="ptit">공정<span class="svd" id="svd_${id}">저장됨 ✓</span></div>
    <ol class="stlist" id="steps_${id}">${procs.map((s,i)=>`<li class="stli"><textarea class="sta" rows="1" oninput="aH(this)" onchange="sProc('${ex(name)}')">${s}</textarea><button class="sdel" onclick="dStep('${ex(name)}',${i})">✕</button></li>`).join('')}</ol>
    <button class="adds" onclick="addStep('${ex(name)}')">＋ 단계 추가</button></div>
  <div class="notew"><div class="ptit">메모</div>
    <textarea class="noteta" id="nt_${id}" placeholder="특이사항, 주의점, 팁…" onchange="sNotes('${ex(name)}')">${notes}</textarea></div>`;
  return h;
}

function chQ(name,d){const el=$('qty_'+sid(name));if(!el)return;el.value=Math.max(1,(parseInt(el.value)||1)+d);updateCalc(name);}
function updateCalc(name){
  const id=sid(name),d=S.recipes[name];if(!d)return;
  const qty=parseInt($('qty_'+id)?.value)||1;
  const adds=S.adds[name]||{},dels=S.dels[name]||{},edits=S.edits[name]||{};
  let grand=0,hasCost=false;
  (d.sections||[]).forEach((sec,si)=>{
    const bI=(sec.ingredients||[]).map((ing,ii)=>({ing,ii,isAdd:false})).filter(({ii})=>!dels[`${si}_${ii}`]);
    const aI=(adds[si]||[]).map((ing,ai)=>({ing,ai,isAdd:true}));
    let t1=0,tc=0,tcc=0;
    [...bI,...aI].forEach(({ing,ii,isAdd,ai})=>{
      const ed=isAdd?{}:(edits[`${si}_${ii}`]||{});
      const po=ed.per_one!==undefined?ed.per_one:ing.per_one;
      const cv=po*qty;t1+=po;tc+=cv;
      const rk=isAdd?`add_${si}_${ai}`:`${si}_${ii}`;
      const cel=document.getElementById(`cv_${id}_${rk}`);if(cel)cel.textContent=cv.toFixed(1)+'g';
      const cpg=(!isAdd&&ing.cpg!=null)?ing.cpg:null;
      const ccel=document.getElementById(`cc_${id}_${rk}`);
      if(cpg!==null){const cost=cpg*cv;tcc+=cost;grand+=cost;hasCost=true;if(ccel)ccel.textContent='₩'+Math.round(cost).toLocaleString();}
      else{if(ccel)ccel.textContent='—';}
    });
    const e1=document.getElementById(`t1_${id}_${si}`),ec=document.getElementById(`tc_${id}_${si}`),ecc=document.getElementById(`tcc_${id}_${si}`);
    if(e1)e1.textContent=t1.toFixed(1)+'g';
    if(ec)ec.textContent=tc.toFixed(1)+'g';
    if(ecc)ecc.textContent=tcc>0?'₩'+Math.round(tcc).toLocaleString():'—';
  });
  const st=$('cs_'+id);if(st)st.textContent=qty===1?'1개 기준':`${qty}개 기준`;
  const ct=$('ct_'+id);if(ct){ct.textContent='재료비 ₩'+Math.round(grand).toLocaleString();ct.classList.toggle('show',hasCost);}
}

async function eIng(name,si,ii,field,val){if(!S.edits[name])S.edits[name]={};const k=`${si}_${ii}`;if(!S.edits[name][k])S.edits[name][k]={};S.edits[name][k][field]=val;await sv('edits',S.edits);updateCalc(name);}
async function eAddIng(name,si,ai,field,val){if(!S.adds[name])S.adds[name]={};if(!S.adds[name][si])S.adds[name][si]=[];if(S.adds[name][si][ai])S.adds[name][si][ai][field]=val;await sv('adds',S.adds);updateCalc(name);}
async function addIng(name,si){if(!S.adds[name])S.adds[name]={};if(!S.adds[name][si])S.adds[name][si]=[];S.adds[name][si].push({name:'새 재료',per_one:0,ratio:0});await sv('adds',S.adds);reloadPanel(name);}
async function delBaseIng(name,si,ii){const ing=S.recipes[name]?.sections[si]?.ingredients[ii];const ingName=(S.edits[name]?.[`${si}_${ii}`]?.name)||ing?.name||'이 재료';if(!confirm(`'${ingName}'을(를) 삭제할까요?`))return;if(!S.dels[name])S.dels[name]={};S.dels[name][`${si}_${ii}`]=true;await sv('dels',S.dels);reloadPanel(name);}
async function delAddIng(name,si,ai){const ing=S.adds[name]?.[si]?.[ai];if(!confirm(`'${ing?.name||'이 재료'}'을(를) 삭제할까요?`))return;if(S.adds[name]?.[si])S.adds[name][si].splice(ai,1);await sv('adds',S.adds);reloadPanel(name);}

function gSteps(name){const el=$('steps_'+sid(name));if(!el)return[];return[...el.querySelectorAll('.sta')].map(t=>t.value);}
async function sProc(name){S.procs[name]=gSteps(name);await sv('procs',S.procs);const el=$('svd_'+sid(name));if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}renderGrid();}
async function addStep(name){S.procs[name]=gSteps(name);S.procs[name].push('');await sv('procs',S.procs);reloadPanel(name);setTimeout(()=>{const last=[...document.querySelectorAll('.sta')].at(-1);if(last){last.focus();aH(last);}},50);}
async function dStep(name,i){S.procs[name]=gSteps(name);S.procs[name].splice(i,1);await sv('procs',S.procs);reloadPanel(name);}
async function sNotes(name){const el=$('nt_'+sid(name));if(!el)return;S.notes[name]=el.value;await sv('notes',S.notes);}

async function uploadCloudinary(file){
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',PRESET);fd.append('folder','momos_recipe');
  try{const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,{method:'POST',body:fd});const j=await r.json();return j.secure_url||null;}catch{return null;}
}
async function onPhoto(name,inp){
  const file=inp.files[0];if(!file)return;
  toast('사진 업로드 중...',8000);
  const url=await uploadCloudinary(file);
  if(!url){toast('업로드 실패');return;}
  S.photos[name]=url;await sv('photos',S.photos);
  renderGrid();if(S.cur===name)reloadPanel(name);
  toast('사진 저장됨 ✓');
}
async function delPhoto(name){delete S.photos[name];await sv('photos',S.photos);reloadPanel(name);renderGrid();}

async function moveCat(newCat){if(!S.cur)return;S.recipes[S.cur].category=newCat;await sv('recipes',S.recipes);buildNav();renderGrid();toast(`→ ${newCat}`);}
async function addCat(){const nm=$('ac-name').value.trim();if(!nm)return;if(S.cats.includes(nm)){toast('이미 있습니다');return;}S.cats.push(nm);await sv('cats',S.cats);closeModal('m-addcat');$('ac-name').value='';buildNav();renderGrid();}
async function toggleFav(name){S.favs[name]=!S.favs[name];await sv('favs',S.favs);renderGrid();}

function openNewModal(){const sel=$('nr-cat');sel.innerHTML=S.cats.filter(c=>c!=='전체').map(c=>`<option value="${c}">${c}</option>`).join('');if(S.cat!=='전체')sel.value=S.cat;$('nr-name').value='';openModal('m-new');setTimeout(()=>$('nr-name').focus(),100);}
async function createRecipe(){const name=$('nr-name').value.trim();const cat=$('nr-cat').value;if(!name){toast('이름을 입력해주세요');return;}if(S.recipes[name]){toast('같은 이름이 있습니다');return;}S.recipes[name]={category:cat,sections:[{section:'반죽',base_count:1,ingredients:[{name:'재료명',per_one:0,ratio:0}]}]};await sv('recipes',S.recipes);closeModal('m-new');buildNav();renderGrid();setTimeout(()=>openPanel(name),200);}
function askDelete(){if(!S.cur)return;$('m-del-msg').textContent=`'${S.cur}' 레시피를 삭제할까요?`;openModal('m-del');}
async function confirmDelete(){if(!S.cur)return;delete S.recipes[S.cur];await sv('recipes',S.recipes);closeModal('m-del');closePanel();buildNav();renderGrid();}
async function copyRecipe(){if(!S.cur)return;let nw=S.cur+' (복사)';let i=2;while(S.recipes[nw])nw=S.cur+` (복사${i++})`;S.recipes[nw]=JSON.parse(JSON.stringify(S.recipes[S.cur]));await sv('recipes',S.recipes);buildNav();renderGrid();closePanel();setTimeout(()=>openPanel(nw),300);}
async function renameRecipe(newName){const old=S.cur;newName=newName.trim();if(!newName||newName===old)return;if(S.recipes[newName]){toast('같은 이름이 있습니다');$('pnm-in').value=old;return;}S.recipes[newName]=S.recipes[old];delete S.recipes[old];['edits','procs','notes','adds','dels','favs','photos'].forEach(k=>{if(S[k][old]!==undefined){S[k][newName]=S[k][old];delete S[k][old];sv(k,S[k]);}});await sv('recipes',S.recipes);S.cur=newName;buildNav();renderGrid();}

function reloadPanel(name){const d=S.recipes[name];if(!d)return;const sc=$('panel').scrollTop;$('pbd').innerHTML=buildBody(name,d);$('panel').scrollTop=sc;updateCalc(name);}

function printRecipe(){if(!S.cur)return;const name=S.cur;const d=S.recipes[name];if(!d)return;const pa=$('print-area');let html=`<h1>${name}</h1>`;(d.sections||[]).forEach((sec,si)=>{const dels=S.dels[name]||{};const adds=S.adds[name]||{};const edits=S.edits[name]||{};const lbl=sec.section||(si===0?'반죽':`파트${si+1}`);const bI=(sec.ingredients||[]).map((ing,ii)=>({ing,ii})).filter(({ii})=>!dels[`${si}_${ii}`]);const aI=(adds[si]||[]).map((ing,ii)=>({ing,ii:1000+ii}));const all=[...bI,...aI];html+=`<h3>${lbl}</h3><table style="width:100%;border-collapse:collapse"><thead><tr><th>재료명</th><th>1개(g)</th><th>비율</th></tr></thead><tbody>`;all.forEach(({ing,ii})=>{const ed=(edits[`${si}_${ii}`]||{});html+=`<tr><td>${ed.name||ing.name}</td><td>${Number(ed.per_one||ing.per_one).toFixed(2)}</td><td>${Number(ed.ratio||ing.ratio).toFixed(1)}%</td></tr>`;});html+='</tbody></table>';});const procs=S.procs[name]||[];if(procs.length)html+=`<h3>공정</h3><ol>${procs.map(s=>`<li>${s}</li>`).join('')}</ol>`;const notes=S.notes[name]||'';if(notes)html+=`<h3>메모</h3><p>${notes}</p>`;pa.innerHTML=html;window.print();setTimeout(()=>pa.innerHTML='',1000);}

</script>
</body>
</html>
